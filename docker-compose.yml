version: '3.9'
# ════════════════════════════════════════════════════════════════
#  VIITS — Docker Compose (Producción)
#  2 servicios independientes:
#    • backend   — Node.js monolito en :3000
#    • frontend  — React/Vite + nginx en :80
# ════════════════════════════════════════════════════════════════

services:
  # ── Backend monolito Node.js ─────────────────────────────────
  backend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-hernan-saroa}/viits-backend:${IMAGE_TAG:-latest}
    # En desarrollo local sin imagen publicada, construye desde código fuente:
    build:
      context: ./backend
      dockerfile: Dockerfile
    environment:
      - NODE_ENV=production
      - PORT=3000
      - JWT_SECRET=${JWT_SECRET}
      - JWT_EXPIRES_IN=${JWT_EXPIRES_IN:-24h}
      - SECRET_KEY_EMAIL_HASH=${SECRET_KEY_EMAIL_HASH}
      - CORS_ORIGIN=${CORS_ORIGIN:-http://localhost}
      # Base de datos PostgreSQL (producción) — si se usa SQLite, omitir
      - DB_HOST=${DB_HOST:-}
      - DB_PORT=${DB_PORT:-5432}
      - DB_NAME=${DB_NAME:-}
      - DB_USER=${DB_USER:-}
      - DB_PASSWORD=${DB_PASSWORD:-}
      # Elasticsearch (opcional)
      - ELASTIC_URL=${ELASTIC_URL:-}
      - ELASTIC_USER=${ELASTIC_USER:-}
      - ELASTIC_PASS=${ELASTIC_PASS:-}
      # SMTP (opcional)
      - SMTP_HOST=${SMTP_HOST:-}
      - SMTP_PORT=${SMTP_PORT:-587}
      - SMTP_USER=${SMTP_USER:-}
      - SMTP_PASS=${SMTP_PASS:-}
      - EMAIL_FROM=${EMAIL_FROM:-noreply@invias.gov.co}
      - LOG_LEVEL=${LOG_LEVEL:-info}
    volumes:
      # Persistir SQLite y archivos subidos fuera del contenedor
      - backend_data:/app/data
      - backend_uploads:/app/uploads
      - backend_logs:/app/logs
    restart: unless-stopped
    healthcheck:
      test: [ "CMD", "wget", "-qO-", "http://localhost:3000/api/health" ]
      interval: 30s
      timeout: 10s
      start_period: 15s
      retries: 3
    # No exponer el puerto del backend al exterior — solo nginx llega a él
    expose:
      - "3000"

  # ── Frontend React/Vite + nginx ──────────────────────────────
  frontend:
    image: ghcr.io/${GITHUB_REPOSITORY_OWNER:-hernan-saroa}/viits-frontend:${IMAGE_TAG:-latest}
    build:
      context: ./viits-frontend
      dockerfile: Dockerfile
    ports:
      - "${FRONTEND_PORT:-80}:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped

volumes:
  backend_data:
    driver: local
  backend_uploads:
    driver: local
  backend_logs:
    driver: local
